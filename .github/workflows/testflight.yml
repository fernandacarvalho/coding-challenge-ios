name: Deploy to TestFlight

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "What changed in this build?"
        required: false
        default: "Bug fixes and improvements"

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          XCODE_PATH="${XCODE_PATH:-/Applications/Xcode.app}"
          echo "Selected Xcode: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          working-directory: world-peek-ios
          bundler-cache: true

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: world-peek-ios/world-peek-ios.xcodeproj/project.xcworkspace/xcshareddata/swiftpm
          key: spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-

      - name: Build & Deploy
        working-directory: world-peek-ios
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: bundle exec fastlane beta
