# SwiftLint configuration for WorldPeek iOS

included:
  - world-peek-ios

excluded:
  - world-peek-iosTests
  - world-peek-iosUITests
  - world-peek-ios/Assets.xcassets

# ---------------------------------------------------------------------------
# Opt-in rules
# ---------------------------------------------------------------------------
opt_in_rules:
  - sorted_imports
  - closure_spacing
  - operator_usage_whitespace
  - trailing_closure
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - toggle_bool
  - first_where
  - last_where
  - sorted_first_last
  - explicit_init
  - redundant_nil_coalescing
  - prefer_self_type_over_type_of_self
  - unused_import
  - empty_count
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_range_nil_comparison
  - flatmap_over_map_reduce
  - prefer_zero_over_explicit_init

# ---------------------------------------------------------------------------
# Disabled rules
# ---------------------------------------------------------------------------
disabled_rules:
  - trailing_comma           # project does not use trailing commas — consistent as-is
  - computed_accessors_order # SwiftUI body properties exceed this regularly
  - for_where                # guard-based idiom is preferred in the project

# ---------------------------------------------------------------------------
# Rule configuration
# ---------------------------------------------------------------------------

line_length:
  warning: 130
  error: 160
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 50
  error: 80

type_body_length:
  warning: 300
  error: 450

file_length:
  warning: 400
  error: 500
  ignore_comment_only_lines: true

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - i
    - r
    - g
    - b

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 5

trailing_closure:
  only_single_muted_parameter: true

vertical_whitespace:
  max_empty_lines: 1

# ---------------------------------------------------------------------------
# Custom rules
# ---------------------------------------------------------------------------
custom_rules:

  mark_spacing:
    name: "MARK Spacing"
    regex: '\/\/MARK:'
    message: "Use '// MARK:' with a space after '//' (found '//MARK:')."
    severity: warning

  no_uikit_in_presentation:
    name: "No UIKit in Presentation"
    regex: '^import UIKit'
    included: ".*/Presentation/.*\\.swift"
    message: "Presentation layer files must not import UIKit. Move UIKit usage to the Composer or Coordinator."
    severity: warning

  no_swiftui_in_presentation:
    name: "No SwiftUI in Presentation"
    regex: '^import SwiftUI'
    included: ".*/Presentation/.*\\.swift"
    message: "Presentation layer files must not import SwiftUI. Keep the Presentation layer framework-agnostic."
    severity: warning

  no_print_in_production:
    name: "No print() in Production Code"
    regex: '(?<!\/\/ )\bprint\('
    excluded:
      - ".*/Shared/Network/NetworkLogger\\.swift"
    message: "Avoid bare print() in production code. Use NetworkLogger or a dedicated logging abstraction guarded by #if DEBUG."
    severity: warning
